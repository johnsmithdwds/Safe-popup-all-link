<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaving App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#0a0f1a;overflow:hidden}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10}
.popup-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:20}
.popup{position:relative;background:#fff;border-radius:8px;padding:20px;margin:0 16px;max-width:340px;width:calc(100% - 32px);pointer-events:auto;animation:popupIn .4s ease;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.popup h1{font-size:16px;font-weight:600;margin-bottom:8px}
.popup p{font-size:14px;line-height:1.5;margin-bottom:16px;color:#374151}
.popup .actions{display:flex;align-items:center;justify-content:flex-end;gap:12px}
.popup button{background:transparent;border:none;font-size:14px;font-weight:600;letter-spacing:.5px;color:#0a0f1a;cursor:pointer;transition:color .2s}
.popup button:hover{color:#6b7280}
.popup button.continue{color:#2563eb}
.popup button.continue:hover{color:#1d4ed8}
@keyframes popupIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="popup-container" id="popupContainer"></div>

<script>
var URLS = [
  "https://www.effectivecpmnetwork.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7",
  "https://redirect-all-link.pages.dev/",
  "https://www.effectivecpmnetwork.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44",
  "https://redirect-all-link.pages.dev/",
  "https://www.effectivecpmnetwork.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af"
];

// রোটেশন: প্রতিবার পরের link নেবে, শেষ হলে আবার প্রথম থেকে শুরু
var currentIndex = parseInt(localStorage.getItem("redirectIndex") || "0", 10);
if (isNaN(currentIndex) || currentIndex < 0 || currentIndex >= URLS.length) currentIndex = 0;

var TARGET_URL = URLS[currentIndex];

// পরের বারের জন্য index আপডেট
var nextIndex = (currentIndex + 1) % URLS.length;
localStorage.setItem("redirectIndex", String(nextIndex));

function isInApp() {
  var ua = navigator.userAgent || navigator.vendor || window.opera || "";
  return (
    ua.indexOf("FBAN") !== -1 ||
    ua.indexOf("FBAV") !== -1 ||
    ua.indexOf("Instagram") !== -1 ||
    ua.indexOf("Messenger") !== -1 ||
    ua.indexOf("Telegram") !== -1 ||
    /\bLine\b/i.test(ua) ||
    ua.indexOf("Snapchat") !== -1 ||
    ua.indexOf("Twitter") !== -1 ||
    ua.indexOf("MicroMessenger") !== -1
  );
}

function openChrome(url) {
  var clean = url.replace(/^https?:\/\//, "");
  window.location.href = "intent://" + clean + "#Intent;scheme=https;package=com.android.chrome;end";
}

function openExternalIOS(url) {
  window.location.href = "x-safari-" + url;
  setTimeout(function(){ window.location.href = "googlechromes://" + url.replace("https://",""); }, 500);
  setTimeout(function(){ window.location.href = url; }, 1200);
}

function doRedirect() {
  var ua = navigator.userAgent || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);

  if (isInApp()) {
    if (isAndroid) return openChrome(TARGET_URL);
    if (isIOS) return openExternalIOS(TARGET_URL);
  }
  // সব normal browser ও desktop এর জন্য সরাসরি redirect
  window.location.href = TARGET_URL;
}

function createPopup() {
  var div = document.createElement("div");
  div.className = "popup";
  div.innerHTML =
    '<h1>You\'re leaving our app</h1>' +
    '<p>The website you\'re viewing is attempting to open an external app. Would you like to continue?</p>' +
    '<div class="actions">' +
    '<button onclick="goBack()">GO BACK</button>' +
    '<button class="continue" onclick="continueAction()">CONTINUE</button>' +
    '</div>';
  document.getElementById("popupContainer").appendChild(div);
}

function goBack() {
  history.length > 1 ? history.back() : window.close();
}

function continueAction() {
  doRedirect();
}

// Auto redirect — কোনো reload নেই
createPopup();
setTimeout(doRedirect, 800);
</script>
</body>
</html>
